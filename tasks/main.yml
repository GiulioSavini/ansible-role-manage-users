---
- name: Valida input
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | length > 0
    fail_msg: "Ogni elemento di manage_users_list deve avere il campo 'name'"
    quiet: true
  loop: "{{ manage_users_list }}"
  loop_control:
    label: "{{ item.name | default('<missing>') }}"
  tags:
    - manage-users
    - always

- name: Crea o rimuovi utenti
  ansible.builtin.user:
    name: "{{ item.name }}"
    shell: "{{ item.shell | default(manage_users_default_shell) }}"
    groups: "{{ item.groups | default(omit) }}"
    append: "{{ item.append | default(manage_users_default_append_groups) }}"
    create_home: "{{ item.create_home | default(manage_users_default_create_home) }}"
    state: "{{ item.state | default(manage_users_default_state) }}"
    remove: "{{ item.remove | default(false) }}"
  loop: "{{ manage_users_list }}"
  loop_control:
    label: "{{ item.name }}"
  tags:
    - manage-users
    - manage-users-account

- name: Configura chiavi SSH autorizzate
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
    exclusive: false
  loop: "{{ manage_users_list | subelements('ssh_keys', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}"
  when: (item.0.state | default(manage_users_default_state)) == 'present'
  tags:
    - manage-users
    - manage-users-ssh

- name: Configura sudoers per utenti con sudo abilitato
  ansible.builtin.copy:
    dest: "{{ manage_users_sudoers_dir }}/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) {{ 'NOPASSWD:' if (item.sudo_nopasswd | default(manage_users_default_sudo_nopasswd)) | bool else '' }}ALL\n"
    owner: root
    group: root
    mode: '0440'
    validate: 'visudo -cf %s'
  loop: "{{ manage_users_list }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - (item.state | default(manage_users_default_state)) == 'present'
    - (item.sudo | default(manage_users_default_sudo)) | bool
  tags:
    - manage-users
    - manage-users-sudo

- name: Rimuovi sudoers drop-in quando utente assente o sudo disabilitato
  ansible.builtin.file:
    path: "{{ manage_users_sudoers_dir }}/{{ item.name }}"
    state: absent
  loop: "{{ manage_users_list }}"
  loop_control:
    label: "{{ item.name }}"
  when: >
    (item.state | default(manage_users_default_state)) == 'absent'
    or not (item.sudo | default(manage_users_default_sudo)) | bool
  tags:
    - manage-users
    - manage-users-sudo
